[conda]
style = "bg:2"
format = '[[ $symbol( $environment)](fg:#83a598 bg:8)]($style)'

[pixi]
style = "bg:2"
format = '[[ $symbol( $version)( $environment)]( bg:8)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:0"
format = '[[ ïگ؛ $time ]( bg:0)]($style)'

[battery]
disabled = false
format = "[ $symbol$percentage]($style)"

[[battery.display]]
