format = "[[ $symbol( $version) ]( bg:3)]($style)"

[c]
symbol = "¯İŞ "
style = "bg:3"
format = "[[ $symbol( $version) ]( bg:3)]($style)"

[cpp]
symbol = "¯İØ "
