version_format = "${raw}"
format = "[ ${symbol} (${version})($virtualenv)]($style)"

[package]
style = " bg:2"
symbol = "¾░Åù "
format = "[ $symbol$version]($style)"

[docker_context]
symbol = "´îê"
style = "bg:2"
format = "[[ $symbol( $context)](fg:#83a598 bg:8)]($style)"

[conda]
style = "bg:2"
format = "[[ $symbol( $environment)](fg:#83a598 bg:8)]($style)"

[pixi]
style = "bg:2"
format = "[[ $symbol( $version)( $environment)]( bg:8)]($style)"

[time]
disabled = false
time_format = "%R"
style = "bg:0"
format = "[[ ´É║ $time ]( bg:0)]($style)"

[battery]
disabled = false
format = "[ $symbol$percentage]($style)"

[[battery.display]]
threshold = 20
style = "bold fg:red bg:4"

[memory_usage]
disabled = false
threshold = 90
symbol = "¯┐à "
style = "bg:4"
format = "[ $symbol ${ram}]($style)"

[line_break]
disabled = false

[fill]
symbol = "ÔöÇ"
style = "selection-background"

[character]
disabled = false
