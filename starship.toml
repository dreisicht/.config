# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'
palette = "noctalia"

# Inserts a blank line between shell prompts
add_newline = false

# [έΨΙ](fg:0)\
# [έΨΙ](fg:8)\
# [έΨΙ](fg:7)\
# [έΨΙ](fg:6)\
# [έΨΙ](fg:5)\
# [έΨΙ](fg:4)\
# [έΨΙ](fg:2)\
# [έΨΙ](fg:3)\
# [έΨΙ](fg:1)\
# [.](fg:0)\
# [έΨΙ](fg:9)\
# [έΨΙ](fg:10)\
# [έΨΙ](fg:11)\
# [έΨΙ](fg:12)\
# [έΨΙ](fg:13)\
# [έΨΙ](fg:14)\
# [έΨΙ](fg:15)\

#ΌΓ╢ ΌΓ┤ ΌΓ░ΌΓ▓
format = """
[ΌΓ╢](fg:4)\
$os\
$username\
$sudo\
[ΌΓ┤](bg:8 fg:4)\
$directory\
[ΌΓ┤](fg:8 bg:1)\
$git_branch\
$git_status\
$git_state\
[ΌΓ┤](fg:1 bg:3)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[ΌΓ┤](fg:3 bg:2)\
$package\
$docker_context\
$conda\
$pixi\
[ΌΓ┤](fg:2 bg:6)\
$cmd_duration\
[ΌΓ┤](fg:6 bg:4)\
$battery\
$memory_usage\
[ΌΓ┤](fg:4)\
$line_break\
$character
"""

[os]
disabled = false
format = "[$symbol ]($style)"
style = "bg:4"

[os.symbols]
Windows = "≤░Ξ▓"
Ubuntu = "≤░ΧΙ"
SUSE = "ΎΝΦ"
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "≤░Α╡"
Manjaro = "ΎΝΤ"
Linux = "≤░Ν╜"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
AOSC = "ΎΝΒ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CachyOS = "≤░μΘ"
EndeavourOS = "ΎΗΩ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"
Pop = "ΎΝς"
openSUSE = "Ό╜φ"

[username]
show_always = true
style_user = "bg:4 "
style_root = "bg:4 "
format = '[$user]($style)'
[username.aliases]
peterbaintner = "pb"

[directory]
style = "bg:8"
format = "[ $path ]($style)"
truncation_length = 10
truncation_symbol = "έΑο/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
style = "bg:1"
format = '[[ $symbol $branch ]( bg:1)]($style)'

[git_status]
style = "bg:1"
format = '[[($all_status$ahead_behind )]( bg:1)]($style)'

[git_state]
style = "bg:1"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_metrics]
disabled = false
added_style = "fg:#005d30 bg:1"
deleted_style = "fg:#5d0030 bg:1"
format = '([+$added ]($added_style))([-$deleted]($deleted_style))'

[nodejs]
symbol = "Όεα"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[c]
symbol = "Όαη "
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[cpp]
symbol = "Όαζ "
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[php]
symbol = "ΌαΙ"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[java]
symbol = "ΌΚΨ"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[kotlin]
symbol = "Όα┤"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[haskell]
symbol = "Όαθ"
style = "bg:3"
format = '[[ $symbol( $version) ]( bg:3)]($style)'

[python]
symbol = "ΌαΗ"
style = " bg:3"
pyenv_prefix = " in "
pyenv_version_name = true
version_format = '${raw}'
format = '[ ${symbol} (${version})($virtualenv)]($style)'

[package]
style = " bg:2"
symbol = "≤░ΠΩ "
format = '[ $symbol$version]($style)'

[docker_context]
symbol = "ΎΝΙ"
style = "bg:2"
format = '[[ $symbol( $context)](fg:#83a598 bg:8)]($style)'

[conda]
style = "bg:2"
format = '[[ $symbol( $environment)](fg:#83a598 bg:8)]($style)'

[pixi]
style = "bg:2"
format = '[[ $symbol( $version)( $environment)]( bg:8)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:0"
format = '[[ ΎΡ║ $time ]( bg:0)]($style)'

[battery]
disabled = false
format = "[ $symbol$percentage]($style)"

[[battery.display]]
threshold = 20
style = 'bold fg:red bg:4'

[memory_usage]
disabled = false
threshold = 90
symbol = "Ό┐Ζ "
style = "bg:4"
format = '[ $symbol ${ram}( | ${swap})]($style)'

[line_break]
disabled = false

[fill]
symbol = 'έΦΑ'
style = 'selection-background'

[character]
disabled = false
# έζψέζχΎΡ▓ ΎΡ┤
success_symbol = '[έζψ](bold)'
error_symbol = '[έζψ](bold fg:1)'
vimcmd_symbol = '[έζχ](bold )'
vimcmd_replace_one_symbol = '[έζχ](bold fg:5)'
vimcmd_replace_symbol = '[έζχ](bold fg:5)'
vimcmd_visual_symbol = '[έζχ](bold fg:3)'

[cmd_duration]
style = " bg:6"
format = "[ ΎΑΩ $duration]($style)"

[sudo]
disabled = false
style = " bg:4"
symbol = "έΑλ"
format = "[$symbol]($style)"




























