[directory]
style = "bg:8"
format = "[ $path ]($style)"
truncation_length = 10
truncation_symbol = "â€¦/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Developer" = "َ°²‹ "

[git_branch]
symbol = "ïگک"
style = "bg:1"
format = '[[ $symbol $branch ]( bg:1)]($style)'

[git_status]
style = "bg:1"
format = '[[($all_status$ahead_behind )]( bg:1)]($style)'

[git_state]
style = "bg:1"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[git_metrics]
disabled = false
added_style = "fg:#005d30 bg:1"
deleted_style = "fg:#5d0030 bg:1"
format = '([+$added ]($added_style))([-$deleted]($deleted_style))'

[nodejs]
