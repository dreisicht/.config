# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

#############
### INPUT ###
#############

source = ./keybindings.conf # Keyboard shortcuts
# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = de
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }

    follow_mouse = 1
    mouse_refocus = true
    repeat_rate = 25

}
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor= DP-1, 5120x1440@119.97, auto, 1, bitdepth, 10, cm, srgb
monitor= , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = nautilus

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = TERMINAL,ghostty
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland

env = QT_QPA_PLATFORMTHEME,gtk3
# env = QT_QPA_PLATFORMTHEME,qt6ct

env = QT_QPA_PLATFORMTHEME_QT6,gtk3
# env = QT_QPA_PLATFORMTHEME_QT6,qt6ct

env = GTK_THEME,adw-gtk3-dark

# $GTK_THEME=Catppuccin-Mocha
env = ICON_THEME,Hicolor
env = COLOR_SCHEME,prefer-dark

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    extend_border_grab_area = 3

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 13
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = .95

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(00000070)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 2
        vibrancy = 0
        special = true
        new_optimizations = true
    }
}

render {
    ctm_animation = 2
    cm_auto_hdr = 0
    new_render_scheduling = true
    direct_scanout = 1
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = 1

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = default, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.13, 0.99, 0.29, 1.08
    bezier = liner, 1, 1, 1, 1
    bezier = bounce, 0.4, 0.9, 0.6, 1.0
    bezier = snappyReturn, 0.4, 0.9, 0.6, 1.0
    bezier = easeionoutquart, 0.76, 0, 0.24, 1
    bezier = blend1, 0.22, 1.0, 0.36, 1.0
    bezier = blend2, 0.64, 0, 0.78, 0

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = windows,       1,     1.79,  easeOutQuint
    animation = windowsIn,     1,     1.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     0.49,  linear,       popin 87%

    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     2.03,  quick

    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     2,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade

    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear

    # Causes flickering if set to fade
    animation = workspaces,    1, 0.5, easeionoutquart, slidevert
    animation = zoomFactor,    1,     7,     quick

    animation = border,        1, 1, liner
    animation = borderangle,   0, 30, liner, once
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    focus_on_activate = true
    disable_hyprland_logo = true
    vrr = 2
    middle_click_paste = false
}

cursor {
    no_warps = true
}

# See https://wiki.hypr.land/Configuring/Gestures
# gesture = 3, horizontal, workspace

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Blender file dialog opens too small — give it a reasonable default size
windowrule {
  name = blender_dialog
  match:class = blender
  match:float = 1
  size = 1400 900
  center = on
}

windowrule = workspace 3 silent, match:class spotify
windowrule = workspace 3 silent, match:class steam
windowrule = workspace 3 silent, match:class signal

xwayland {
    force_zero_scaling = true
}

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

group {
  groupbar {
    font_size = 12
  }
}

source = /home/peterbaintner/.config/hypr/noctalia/noctalia-colors.conf

plugin {
    hyprbars {
        # example config
        bar_height = 33
        bar_padding = 13
        bar_part_of_window = true
        bar_precedence_over_border = true
        bar_blur = true
        bar_color = rgba(191724ee)
        bar_buttons_alignment = right
        icon_on_hover = true

        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(d66666), 16, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(d6af66), 16, 󰹟, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(52af62), 16, –, hyprctl dispatch movetoworkspacesilent special
        inactive_button_color = rgb(808080)

        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
    }
}
windowrule {
    name = code-no-bar
    match:class = ^(code-oss|org.gnome.Nautilus|zen|steam|discord)$
    hyprbars:no_bar = true
}


plugin {
    hyprexpo {
        columns = 2
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = first 1
        skip_empty = true
    }
}

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprpm reload
exec-once = easyeffects --gapplication-service
exec-once = qs -c noctalia-shell

# CPU cooler settings
exec-once = sleep 2 && liquidctl --match h150i set fan speed 25 5 30 15 35 40 38 70 40 100
exec-once = sleep 3 && liquidctl initialize --match h150i --pump-mode performance

exec-once = $terminal
exec-once = zen-browser
exec-once = signal-desktop

